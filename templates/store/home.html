{% extends 'base.html' %}

{% block content %}

<h1>Welcome to Django Shop</h1>

<div class="products">

{% for product in products %}

<div class="card">

    {% if product.image %}
        <img src="{{ product.image.url }}"
             width="200">
    {% endif %}

    <h3>{{ product.name }}</h3>

    <p>₹{{ product.price }}</p>

    <a href="{% url 'product_detail' product.slug %}">
        View Product
    </a>

</div>

{% endfor %}

</div>

{% endblock %}
