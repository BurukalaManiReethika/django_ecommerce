{% extends 'base.html' %}

{% block content %}

<h2>Products</h2>

<form method="get">

<select name="category">

<option value="">
All Categories
</option>

{% for category in categories %}

<option value="{{ category.slug }}">
{{ category.name }}
</option>

{% endfor %}

</select>

<button type="submit">
Filter
</button>

</form>

<hr>

{% for product in products %}

<div>

    <h3>{{ product.name }}</h3>

    <p>₹{{ product.price }}</p>

    <a href="{% url 'product_detail' product.slug %}">
        View
    </a>

</div>

<hr>

{% endfor %}

{% endblock %}
